<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Question For You 💌</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --pink: #ff6b9d;
        --deep: #c2185b;
        --soft: #fff0f5;
        --peach: #ffb3c6;
        --white: #ffffff;
      }
      body {
        min-height: 100vh;
        background: var(--soft);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Nunito", sans-serif;
        overflow: hidden;
        position: relative;
        user-select: none;
      }
      .bg-hearts {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-heart {
        position: absolute;
        opacity: 0.18;
        animation: floatUp linear infinite;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(110vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.18;
        }
        90% {
          opacity: 0.18;
        }
        100% {
          transform: translateY(-10vh) rotate(30deg);
          opacity: 0;
        }
      }
      .card {
        position: relative;
        z-index: 1;
        background: var(--white);
        border-radius: 32px;
        padding: 48px 44px 40px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(194, 24, 91, 0.15);
        max-width: 420px;
        width: 90%;
        animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        /* NO button is confined inside card */
        overflow: visible;
      }
      @keyframes popIn {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .bear {
        font-size: 5.5rem;
        line-height: 1;
        margin-bottom: 18px;
        display: block;
        animation: bearBounce 2.4s ease-in-out infinite;
      }
      @keyframes bearBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      h1 {
        font-family: "Pacifico", cursive;
        font-size: 2rem;
        color: var(--deep);
        margin-bottom: 8px;
      }
      .subtitle {
        color: var(--pink);
        font-size: 0.95rem;
        margin-bottom: 32px;
        font-weight: 600;
      }
      .btn-yes {
        font-family: "Nunito", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        padding: 14px 36px;
        cursor: pointer;
        background: linear-gradient(135deg, var(--pink), var(--deep));
        color: var(--white);
        box-shadow: 0 6px 20px rgba(194, 24, 91, 0.35);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        display: block;
        margin: 0 auto 16px;
      }
      .btn-yes:hover {
        transform: scale(1.07);
        box-shadow: 0 10px 28px rgba(194, 24, 91, 0.45);
      }

      /* NO button floats absolutely over the card */
      #noBtn {
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        border: 2px solid var(--peach);
        border-radius: 50px;
        padding: 10px 24px;
        cursor: pointer;
        background: var(--soft);
        color: var(--pink);
        white-space: nowrap;
        position: fixed;
        pointer-events: none; /* mouse events tracked manually */
        z-index: 999;
        transition: none;
      }

      /* YES screen */
      .yes-screen {
        display: none;
        animation: fadeIn 0.5s ease both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .yes-screen .big-heart {
        font-size: 6rem;
        animation:
          heartPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
          heartPulse 1.2s ease-in-out 0.6s infinite;
      }
      @keyframes heartPop {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes heartPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }
      .yes-screen h2 {
        font-family: "Pacifico", cursive;
        font-size: 2rem;
        color: var(--deep);
        margin: 18px 0 10px;
      }
      .yes-screen p {
        color: #b05070;
        font-size: 1rem;
        font-weight: 600;
      }

      .confetti-piece {
        position: fixed;
        top: -10px;
        border-radius: 2px;
        animation: confettiFall linear forwards;
        z-index: 9999;
        pointer-events: none;
      }
      @keyframes confettiFall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-hearts" id="bgHearts"></div>

    <div class="card" id="card">
      <div id="questionView">
        <span class="bear">🐻</span>
        <h1>Do you love me?</h1>
        <p class="subtitle">Think carefully… 👀</p>
        <button class="btn-yes" onclick="onYes()">Yes! 💖</button>
        <p style="color: #cca0b0; font-size: 0.85rem; margin-top: 4px">or...</p>
      </div>
      <div class="yes-screen" id="yesView">
        <div class="big-heart">💖</div>
        <h2>Yay! I knew it!</h2>
        <p>You just made my whole world 🌸</p>
      </div>
    </div>

    <!-- No button lives here, outside card, fixed -->
    <button id="noBtn">No 😢</button>

    <script>
      /* Background hearts */
      const bgHearts = document.getElementById("bgHearts");
      const emojis = ["💕", "💗", "💓", "💞", "🌸", "✨", "🦋", "💝"];
      for (let i = 0; i < 22; i++) {
        const el = document.createElement("span");
        el.classList.add("bg-heart");
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = 1 + Math.random() * 1.4 + "rem";
        el.style.animationDuration = 7 + Math.random() * 9 + "s";
        el.style.animationDelay = -Math.random() * 10 + "s";
        bgHearts.appendChild(el);
      }

      /* ── NO button: track mouse, run away when cursor gets close ── */
      const noBtn = document.getElementById("noBtn");
      const SAFE_DIST = 80; // px — how close before it runs

      // Place it initially inside the card, below the YES button
      function placeInitial() {
        const card = document.getElementById("card");
        const r = card.getBoundingClientRect();
        const bw = noBtn.offsetWidth;
        const bh = noBtn.offsetHeight;
        // centre-bottom of card
        noBtn.style.left = r.left + r.width / 2 - bw / 2 + "px";
        noBtn.style.top = r.bottom - bh - 20 + "px";
      }

      function runAway() {
        const card = document.getElementById("card");
        const r = card.getBoundingClientRect();
        const bw = noBtn.offsetWidth;
        const bh = noBtn.offsetHeight;
        const pad = 12;
        // Pick a random position INSIDE the card
        const newX = r.left + pad + Math.random() * (r.width - bw - pad * 2);
        const newY = r.top + pad + Math.random() * (r.height - bh - pad * 2);
        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
      }

      document.addEventListener("mousemove", (e) => {
        const r = noBtn.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < SAFE_DIST) runAway();
      });

      // Also run on touch move
      document.addEventListener(
        "touchmove",
        (e) => {
          const touch = e.touches[0];
          const r = noBtn.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dx = touch.clientX - cx;
          const dy = touch.clientY - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < SAFE_DIST) {
            runAway();
            e.preventDefault();
          }
        },
        { passive: false },
      );

      window.addEventListener("load", placeInitial);
      window.addEventListener("resize", placeInitial);

      /* YES */
      function onYes() {
        document.getElementById("questionView").style.display = "none";
        document.getElementById("yesView").style.display = "block";
        noBtn.style.display = "none";
        launchConfetti();
      }

      /* Confetti */
      const colors = [
        "#FF6B9D",
        "#FFB3C6",
        "#C2185B",
        "#FFD700",
        "#A8EDEA",
        "#FFC3A0",
      ];
      function launchConfetti() {
        for (let i = 0; i < 120; i++) {
          setTimeout(() => {
            const p = document.createElement("div");
            p.classList.add("confetti-piece");
            p.style.left = Math.random() * 100 + "vw";
            p.style.background =
              colors[Math.floor(Math.random() * colors.length)];
            p.style.width = 8 + Math.random() * 8 + "px";
            p.style.height = 8 + Math.random() * 8 + "px";
            p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
            p.style.animationDuration = 2 + Math.random() * 2 + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
          }, i * 18);
        }
      }
    </script>
  </body>
</html>
